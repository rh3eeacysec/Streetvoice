<!DOCTYPE html>
<html lang="en" data-theme="modern">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetVoice — Validation Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="app-config.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="credits.js"></script>
  <script src="toast.js"></script>

  <style>
    [data-theme="90s"] { 
      --bg: #fcfbf7; --surface: #ffffff; --text: #111111; --accent: #111111; 
      --border: #222222; --radius: 0px; --font: serif;
      --brand-color: #111111; --btn-text: #ffffff; --card-bg: #ffffff;
      --text-muted: #555555; --nav-active: #111111; --nav-active-text: #ffffff;
    }
    [data-theme="y2k"] { 
      --bg: #0b0117; --surface: rgba(24, 3, 48, 0.85); --text: #fef08a; --accent: #eab308; 
      --border: #ca8a04; --radius: 8px; --font: monospace;
      --brand-color: #fef08a; --btn-text: #000000; --card-bg: rgba(30, 4, 60, 0.6);
      --text-muted: #a16207; --nav-active: #eab308; --nav-active-text: #0b0117;
    }
    [data-theme="modern"] { 
      --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --accent: #38bdf8; 
      --border: #334155; --radius: 16px; --font: system-ui, -apple-system, sans-serif;
      --brand-color: #38bdf8; --btn-text: #0f172a; --card-bg: #1e293b;
      --text-muted: #94a3b8; --nav-active: #38bdf8; --nav-active-text: #0f172a;
    }

    body { 
      background: var(--bg); color: var(--text); font-family: var(--font); 
      transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .glass-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); }
    .text-muted { color: var(--text-muted); }

    .nav-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg);
    }
    .nav-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .nav-btn.active {
      background: var(--nav-active); color: var(--nav-active-text);
      font-weight: 900; border-color: var(--nav-active);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .feed-item { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }

    .skeleton-pulse { animation: skeletonPulse 1.4s ease-in-out infinite; }
    @keyframes skeletonPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

    #bg-video-layer {
      position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
    }
    #bg-video-layer video {
      position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
      object-fit: cover; transform: translate(-50%, -50%);
    }
    #bg-video-overlay {
      position: fixed; inset: 0; z-index: -1; background: var(--bg); opacity: 0.85;
      transition: background 0.4s ease, opacity 0.4s ease; pointer-events: none;
    }
    [data-theme="90s"] #bg-video-overlay { opacity: 0.92; }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

  <div id="bg-video-layer">
    <video autoplay muted loop playsinline preload="auto">
      <source src="bg_index.mp4" type="video/mp4">
    </video>
  </div>
  <div id="bg-video-overlay"></div>

  <div class="max-w-4xl mx-auto space-y-6">

    <nav class="w-full flex flex-wrap gap-2 p-2 glass-card items-center justify-start overflow-x-auto shadow-md">
      <a href="dashboard.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">🏠 Home</a>
      <a href="report.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">📢 Report</a>
      <a href="feed.html" class="nav-btn active px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">📰 Feed</a>
      <a href="riskmap.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">🗺️ RiskMap</a>
      <a href="agents.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">🤖 AI Agents</a>
      <a href="studio.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">🎨 Studio</a>
      <a href="leaderboard.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap">🏆 Leaderboard</a>
      <a href="profile.html" class="nav-btn px-3 py-2 text-xs font-bold flex items-center gap-1.5 whitespace-nowrap ml-auto">👤 Profile</a>
    </nav>

    <div class="w-full flex flex-wrap justify-between items-center p-4 glass-card gap-4 shadow-sm">
      <div class="flex items-center gap-2">
        <span class="text-xs font-bold uppercase tracking-wider">Design Era:</span>
        <button onclick="setGlobalEra('90s')" class="px-2 py-1 border text-[11px] font-bold rounded hover:opacity-80 transition" style="border-color: var(--border);">90s</button>
        <button onclick="setGlobalEra('y2k')" class="px-2 py-1 border text-[11px] font-bold rounded hover:opacity-80 transition" style="border-color: var(--border);">Y2K</button>
        <button onclick="setGlobalEra('modern')" class="px-2 py-1 border text-[11px] font-bold rounded hover:opacity-80 transition" style="border-color: var(--border);">Modern</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs font-bold uppercase tracking-wider">Language:</span>
        <button onclick="changeGlobalLanguage('en')" class="px-3 py-1 border text-[11px] font-bold rounded hover:opacity-80 transition" style="border-color: var(--border);">EN</button>
        <button onclick="changeGlobalLanguage('hi')" class="px-3 py-1 border text-[11px] font-bold rounded hover:opacity-80 transition" style="border-color: var(--border);">हिन्दी</button>
      </div>
    </div>

    <header class="flex justify-between items-center pb-4 border-b border-current/10" style="border-color: var(--border);">
      <div>
        <h1 class="text-2xl font-black uppercase tracking-tight" id="txt-title">Risk Analysis Feed</h1>
        <p class="text-xs text-muted" id="txt-subtitle">Live public audit and triage matrix tracking local incidents.</p>
      </div>
    </header>

    <div id="feed-container" class="space-y-4">
      <!-- Skeleton loading cards shown immediately, replaced once real data arrives -->
      <div class="p-5 glass-card skeleton-pulse h-24"></div>
      <div class="p-5 glass-card skeleton-pulse h-24"></div>
      <div class="p-5 glass-card skeleton-pulse h-24"></div>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        title: "Risk Analysis Feed",
        subtitle: "Live public audit and triage matrix tracking local incidents.",
        empty: "No hazards logged on active coordinates yet. Be the first to report one.",
        voteLabel: "Upvote",
        votedLabel: "Upvoted",
        verifyBtn: "Verify Threat",
        mockNotice: "⚠️ SIMULATED MOCK DATA",
        connecting: "Connecting securely to active regional data streams...",
        authError: "Could not verify your session — refresh the page and try again."
      },
      hi: {
        title: "जोखिम विश्लेषण फ़ीड",
        subtitle: "स्थानीय समस्याओं की लाइव सार्वजनिक ऑडिट और ट्राइएज मैट्रिक्स ट्रैकिंग।",
        empty: "अभी तक कोई समस्या दर्ज नहीं है। पहली रिपोर्ट करने वाले बनें।",
        voteLabel: "वोट दें",
        votedLabel: "वोट दिया है",
        verifyBtn: "पुष्टि करें",
        mockNotice: "⚠️ सिम्युलेटेड मॉक डेटा प्रविष्टि",
        connecting: "सुरक्षित रूप से कनेक्ट हो रहा है...",
        authError: "सत्र सत्यापित नहीं हो सका — पुनः प्रयास करें।"
      }
    };

    let currentLang = 'en';
    let globalSnapshotData = null;

    function setGlobalEra(era) {
      document.documentElement.setAttribute('data-theme', era);
      localStorage.setItem('streetvoice_era_theme', era);
    }

    function changeGlobalLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('streetvoice_lang', lang);
      updateStaticLabels();
      renderFeedFromSnapshot();
    }

    function updateStaticLabels() {
      const dict = translations[currentLang] || translations.en;
      document.getElementById("txt-title").textContent = dict.title;
      document.getElementById("txt-subtitle").textContent = dict.subtitle;
    }

    function getVotedLedger() {
      try {
        return JSON.parse(localStorage.getItem('streetvoice_voted_reports')) || [];
      } catch (e) {
        return [];
      }
    }

    /* ==========================================================================
       FIX 1 of 2: wait for real Firebase Auth before reading "reports" —
       this page previously had NO Auth SDK loaded at all, so under the
       locked database rules (auth != null required), this read was almost
       certainly being silently rejected every time, which is the real reason
       the page felt stuck on "Connecting..." or took ages to show anything.
       ========================================================================== */
    async function listenToFirebaseFeed() {
      const dict = translations[currentLang] || translations.en;

      if (!window.db) {
        document.getElementById("feed-container").innerHTML = `<div class="text-red-500 p-4 font-mono text-xs">Error: Configuration file offline.</div>`;
        return;
      }

      if (window.authReady) {
        const uid = await window.authReady;
        if (!uid) {
          document.getElementById("feed-container").innerHTML = `<div class="text-red-500 p-4 font-mono text-xs">${dict.authError}</div>`;
          return;
        }
      }

      db.ref('reports').on('value', (snapshot) => {
        const data = snapshot.val();
        globalSnapshotData = data || null;
        renderFeedFromSnapshot();
      }, (error) => {
        console.error("Feed read failed:", error);
        document.getElementById("feed-container").innerHTML = `<div class="text-red-500 p-4 font-mono text-xs">⚠️ Could not load reports — check your connection.</div>`;
      });
    }

    function renderFeedFromSnapshot() {
      const container = document.getElementById("feed-container");
      if (!container) return;

      const dict = translations[currentLang] || translations.en;
      const votedLedger = getVotedLedger();

      if (!globalSnapshotData) {
        container.innerHTML = `<div class="text-center p-12 text-muted font-mono text-xs">${dict.empty}</div>`;
        return;
      }

      container.innerHTML = "";

      const list = Object.keys(globalSnapshotData).map(key => ({ id: key, ...globalSnapshotData[key] }))
                           .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      list.forEach((report, index) => {
        let badgeColor = "bg-emerald-500/20 text-emerald-400 border-emerald-500/30";
        if (report.severity === "MEDIUM") badgeColor = "bg-amber-500/20 text-amber-400 border-amber-500/30";
        if (report.severity === "HIGH") badgeColor = "bg-orange-500/20 text-orange-400 border-orange-500/30";
        if (report.severity === "CRITICAL") badgeColor = "bg-red-500/20 text-red-400 border-red-500/40 animate-pulse";

        const hasVoted = votedLedger.includes(report.id);
        const status = report.status || 'open';
        const statusLabels = { open: '🔴 Open', in_progress: '🟡 In Progress', resolved: '✅ Resolved' };

        const card = document.createElement("div");
        card.className = "p-5 glass-card feed-item flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-lg";
        card.style.animationDelay = `${Math.min(index * 0.02, 0.3)}s`;

        card.innerHTML = `
          <div class="space-y-2 flex-1">
            <div class="flex flex-wrap items-center gap-2">
              <span class="px-2 py-0.5 border text-[10px] font-black uppercase tracking-wider rounded ${badgeColor}">
                ${report.severity || 'LOW'} [${report.severityScore || '0'}/100]
              </span>
              <span class="px-2 py-0.5 border text-[10px] font-bold rounded" style="border-color: var(--border);">${statusLabels[status]}</span>
              ${report.isMock ? `<span class="px-2 py-0.5 border text-[10px] font-mono text-amber-500 border-amber-500/30 rounded bg-amber-500/5 font-bold">${dict.mockNotice}</span>` : ''}
              <span class="text-[10px] font-bold opacity-60 font-mono tracking-tight">Loc: ${report.location || 'MUMBAI'}</span>
              <span class="text-[10px] opacity-40 font-mono ml-auto md:ml-0">${report.timestamp ? new Date(report.timestamp).toLocaleTimeString() : ''}</span>
            </div>
            <h3 class="text-base font-bold tracking-tight">${report.category || 'Unknown'}</h3>
            <p class="text-xs text-muted leading-relaxed max-w-2xl">${report.desc || ''}</p>
            <div class="text-[10px] font-mono text-sky-400">Route Assignment: ${report.suggestedDepartment || 'UNASSIGNED'}</div>
          </div>
          
          <div class="flex md:flex-col items-center gap-2 w-full md:w-auto pt-3 md:pt-0 border-t md:border-t-0 border-current/10" style="border-color: var(--border);">
            <button 
              onclick="upvoteReport('${report.id}', ${report.votes || 0})" 
              ${hasVoted ? 'disabled' : ''}
              class="flex-1 md:w-28 text-center py-2 px-3 text-[11px] font-bold rounded-md transition border flex items-center justify-center gap-1
                     ${hasVoted ? 'bg-slate-800/40 text-slate-500 border-slate-700/50 cursor-not-allowed opacity-50' : 'bg-white/5 hover:bg-white/10'}" 
              style="${hasVoted ? '' : 'border-color: var(--border);'}">
              ▲ ${hasVoted ? dict.votedLabel : dict.voteLabel} (${report.votes || 0})
            </button>
            <button onclick="verifyIncident('${report.id}')" class="flex-1 md:w-28 text-center py-2 px-3 text-[11px] font-black uppercase tracking-wider rounded-md bg-cyan-500 hover:bg-cyan-600 text-slate-950 shadow transition">
              ✓ ${dict.verifyBtn}
            </button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function upvoteReport(id, currentVotes) {
      if (!window.db) return;

      const votedLedger = getVotedLedger();
      if (votedLedger.includes(id)) return;

      votedLedger.push(id);
      localStorage.setItem('streetvoice_voted_reports', JSON.stringify(votedLedger));

      db.ref(`reports/${id}`).update({ votes: currentVotes + 1 })
        .catch(err => console.error("Upvote failed:", err));
    }

    async function verifyIncident(id) {
      const currentUserId = localStorage.getItem("streetvoice_current_user");
      if (!currentUserId) {
        if (typeof showToast === 'function') showToast('Could not identify your session.', 'warning');
        return;
      }
      if (typeof awardCreditsOncePerReport === 'function') {
        await awardCreditsOncePerReport(currentUserId, 'verify', id, `Verified report ${id}`);
      }
      if (typeof showToast === 'function') showToast('Verification recorded — thank you!', 'success');
    }

    /* ==========================================================================
       FIX 2 of 2: REMOVED the old auto-seeding logic entirely.
       The previous version called seedMockPresentationData() — which wrote
       12 NEW mock reports into the real database — every single time the
       listener saw an empty "reports" node. That could fire repeatedly
       across page loads/refreshes, silently piling up duplicate mock data
       over time, which is the most likely reason this page (and riskmap.html,
       reading the same data) felt like it was getting slower.

       If you want demo seed data, run it ONCE manually from the browser
       console — see docs/seed-demo-data.md — never automatically on page load.
       ========================================================================== */

    window.addEventListener('DOMContentLoaded', () => {
      setGlobalEra(localStorage.getItem('streetvoice_era_theme') || 'modern');
      currentLang = localStorage.getItem('streetvoice_lang') || 'en';
      updateStaticLabels();
      listenToFirebaseFeed();
    });

    (function () {
      const bgVideo = document.querySelector('#bg-video-layer video');
      if (!bgVideo) return;
      bgVideo.addEventListener('error', () => {
        console.warn('⚠️ Background video (bg_index.mp4) failed to load.');
        document.getElementById('bg-video-layer').style.display = 'none';
      });
    })();
  </script>
  <script src="cursor.js"></script>
</body>
</html>
